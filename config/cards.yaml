  - card_id: "a597c4441b7414c93a7c502d"
    name: "库销比&进销比-by大区*(滔搏纸袋-分型号)"
    role: "regional_model_purchase_analysis"
    section: "inventory_diagnosis"
    pagination:
      limit: 200
      offset: 0
      max_pages: 10
    request_body:
      refresh: true
      view: "GRAPH"
    filters:
      - filterValue:
          - "滔搏纸袋-L"
          - "滔搏纸袋-M"
          - "滔搏纸袋-S"
          - "滔搏纸袋-XL"
          - "滔搏纸袋-XS"
        name: "滔搏纸袋分类"
        fdType: "STRING"
        dsId: "r618a8b9c1c394c9496a4678"
        fdId: "w44eab66644444b9cb08036b"
        metaType: "DIM"
        seqNo: 55
        formula: |-
          case when [产品货号] in("ZD010L","ZD2023L") THEN
          "滔搏纸袋-L"
          when [产品货号] in("ZD010M","ZD2023M") THEN
          "滔搏纸袋-M"
          when [产品货号] in("ZD010XS","ZD2023XS") THEN
          "滔搏纸袋-XS"
          when [产品货号] in("ZD010XL","ZD2023XL") THEN
          "滔搏纸袋-XL"
          when [产品货号] in("ZD010S","ZD2023S") THEN
          "滔搏纸袋-S"
          ELSE "其他" end
        isAggregated: false
        calculationType: "normal"
        id: "42021986-4075-d93b-5a4e-f61b44d5f198"
        filterLevel: "DETAIL"
        filterType: "IN"
